<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule — Havelock Fair 2026 | Horaire</title>
  <meta name="description" content="Full schedule for the 2026 Havelock Fair, September 12-13. Livestock shows, live music, children's activities, antique tractors, and more in Havelock, Quebec.">
  <meta property="og:title" content="Schedule — Havelock Fair 2026">
  <meta property="og:description" content="Two days of livestock shows, live music, children's activities, and community spirit.">
  <link rel="canonical" href="https://havelockfair.ca/pages/schedule.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,300;1,6..72,400;1,6..72,500&family=Spectral:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/heritage.css">
  <link rel="stylesheet" href="../css/heritage-pages.css">
</head>
<body data-nav="schedule">

  <!-- ========== PAGE HERO ========== -->
  <section class="hf-page-hero">
    <img src="../images/home/spotlight/mu-1.jpg" alt="The band performing on the Havelock Fair outdoor stage">
    <div class="hf-page-hero-scrim"></div>
    <div class="hf-frame"></div>
    <div class="hf-page-hero-copy">
      <div class="hf-eyebrow hf-eyebrow--bright" data-i18n="edition_label">155th Edition &middot; Since 1871</div>
      <h1 class="hf-page-title" data-i18n="nav_schedule">Schedule</h1>
      <p class="hf-page-lede" data-i18n="hero_date">September 12&ndash;13, 2026</p>
    </div>
  </section>

  <!-- ========== SCHEDULE ========== -->
  <section class="hf-sec">
    <div class="hf-sec-inner">

      <!-- Day Tabs -->
      <div class="hf-daytabs">
        <button class="day-tab active" data-day="saturday" id="tab-sat"></button>
        <button class="day-tab" data-day="sunday" id="tab-sun"></button>
      </div>

      <!-- Category Filters -->
      <div class="cat-filters" id="cat-filters"></div>

      <!-- Saturday -->
      <div class="day-content active" id="day-saturday">
        <div class="timeline" id="timeline-saturday"></div>
      </div>

      <!-- Sunday -->
      <div class="day-content" id="day-sunday">
        <div class="timeline" id="timeline-sunday"></div>
      </div>

    </div>
  </section>

  <!-- ========== DOWNLOAD PROGRAM (ivory) ========== -->
  <section class="hf-sec hf-sec--ivory hf-sec--tight hf-cta-sec">
    <div class="hf-sec-inner" data-reveal>
      <p class="hf-sec-lede" style="margin: 0 auto;" data-i18n="schedule_download_text">The full 48-page program book includes competition classes, prize lists, regulations, and registration forms.</p>
      <div class="hf-cta-row">
        <a href="../fair-program.pdf" class="hf-btn-gold" target="_blank" rel="noopener" data-i18n="schedule_download_btn">Download Full Program (PDF)</a>
      </div>
    </div>
  </section>

  <!-- Scripts (order matters: chrome → i18n → data → page) -->
  <script src="../js/heritage-chrome.js"></script>
  <script src="../js/i18n.js"></script>
  <script src="../js/schedule-data.js"></script>
  <script>
    let activeDay = "saturday";
    let activeCat = "all";

    function buildTimeline(dayKey) {
      const day = scheduleData[dayKey];
      const lang = currentLang || "en";
      const timeline = document.getElementById(`timeline-${dayKey}`);
      timeline.innerHTML = "";

      const grouped = {};
      day.events.forEach(ev => {
        if (!grouped[ev.time]) grouped[ev.time] = [];
        grouped[ev.time].push(ev);
      });

      Object.entries(grouped).forEach(([time, events]) => {
        const group = document.createElement("div");
        group.className = "time-group";
        group.dataset.time = time;

        const h = parseInt(time.split(":")[0]);
        const ampm = h >= 12 ? "PM" : "AM";
        const h12 = h > 12 ? h - 12 : h;
        const timeStr = lang === "fr" ? `${time.replace(":", "h")}` : `${h12}:${time.split(":")[1]} ${ampm}`;

        group.innerHTML = `
          <div class="time-header">
            <div class="time-dot"></div>
            <div class="time-label">${timeStr}</div>
          </div>
        `;

        events.forEach(ev => {
          const card = document.createElement("div");
          card.className = "event-card";
          card.dataset.cat = ev.cat;
          const catLabel = categoryInfo[ev.cat] ? categoryInfo[ev.cat][lang] || categoryInfo[ev.cat].en : ev.cat;
          card.innerHTML = `
            <div class="event-cat-badge">${catLabel}</div>
            <div class="event-title">${ev[lang] || ev.en}</div>
          `;
          group.appendChild(card);
        });

        timeline.appendChild(group);
      });

      filterEvents();
    }

    function filterEvents() {
      document.querySelectorAll(".day-content.active .event-card").forEach(card => {
        card.classList.toggle("hidden", activeCat !== "all" && card.dataset.cat !== activeCat);
      });
      document.querySelectorAll(".day-content.active .time-group").forEach(group => {
        const visible = group.querySelectorAll(".event-card:not(.hidden)");
        group.classList.toggle("hidden", visible.length === 0);
      });
    }

    function buildFilters() {
      const lang = currentLang || "en";
      const container = document.getElementById("cat-filters");
      container.innerHTML = "";
      Object.entries(categoryInfo).forEach(([key, info]) => {
        const btn = document.createElement("button");
        btn.className = `cat-btn${key === activeCat ? " active" : ""}`;
        btn.dataset.cat = key;
        btn.textContent = info[lang] || info.en;
        btn.addEventListener("click", () => {
          activeCat = key;
          document.querySelectorAll(".cat-btn").forEach(b => b.classList.toggle("active", b.dataset.cat === key));
          filterEvents();
        });
        container.appendChild(btn);
      });
    }

    function updateDayTabs() {
      const lang = currentLang || "en";
      document.getElementById("tab-sat").textContent = scheduleData.saturday[`date_${lang}`] || scheduleData.saturday.date_en;
      document.getElementById("tab-sun").textContent = scheduleData.sunday[`date_${lang}`] || scheduleData.sunday.date_en;
    }

    function switchDay(day) {
      activeDay = day;
      document.querySelectorAll(".day-tab").forEach(t => t.classList.toggle("active", t.dataset.day === day));
      document.querySelectorAll(".day-content").forEach(c => c.classList.toggle("active", c.id === `day-${day}`));
      buildTimeline(day);
    }

    document.querySelectorAll(".day-tab").forEach(tab => {
      tab.addEventListener("click", () => switchDay(tab.dataset.day));
    });

    const origSetLang = setLanguage;
    setLanguage = function(lang) {
      origSetLang(lang);
      buildFilters();
      updateDayTabs();
      buildTimeline(activeDay);
    };

    buildFilters();
    updateDayTabs();
    buildTimeline("saturday");
  </script>
</body>
</html>
